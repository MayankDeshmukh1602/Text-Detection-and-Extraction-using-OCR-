<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Scanner Pro | Secure Access</title>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.2.2/docx.min.js"></script>

  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --text: #1e293b;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-container, .ocr-box {
      background: var(--card-bg);
      padding: 2rem;
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.5s ease-in-out;
    }

    .auth-container { max-width: 400px; }
    .ocr-box { max-width: 750px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 { text-align: center; color: var(--primary); margin-bottom: 1.5rem; font-size: 2rem; }

    input[type="text"], input[type="password"], input[type="email"], select, input[type="file"] {
      width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box;
    }

    button {
      width: 100%; padding: 14px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; transition: all 0.3s ease; margin-top: 10px;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }

    .upload-section { border: 2px dashed #cbd5e1; padding: 30px; border-radius: 15px; text-align: center; margin-bottom: 20px; background: #fafafa; }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    #progress { text-align: center; font-weight: bold; color: #6366f1; margin: 15px 0; }
    textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 12px; resize: none; box-sizing: border-box; font-size: 14px; }
    .download-group { display: flex; gap: 10px; margin-top: 15px; }
    .btn-download { background: #e2e8f0; color: #1e293b; }
    .btn-download:hover { background: #cbd5e1; }

    .hidden { display: none; }
    .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
    .toggle-link span { color: var(--primary); cursor: pointer; font-weight: bold; }
    .error-text { color: red; font-size: 13px; text-align: center; margin-top: 10px; }
    .logout-btn { background: #fee2e2; color: #ef4444; width: auto; padding: 8px 15px; font-size: 12px; float: right; }
  </style>
</head>
<body>

  <div class="auth-container" id="auth-section">
    <div id="login-form">
      <h2>Login 🔐</h2>
      <input type="text" id="login-user" placeholder="Username">
      <input type="password" id="login-pass" placeholder="Password">
      <button class="btn-primary" onclick="handleLogin()">Sign In</button>
      <div class="toggle-link">
        New user? <span onclick="toggleAuth()">Register Here</span>
      </div>
    </div>

    <div id="register-form" class="hidden">
      <h2>Register ✨</h2>
      <input type="text" id="reg-user" placeholder="Create Username">
      <input type="email" id="reg-email" placeholder="Email Address">
      <input type="password" id="reg-pass" placeholder="Create Password">
      <button class="btn-primary" onclick="handleRegister()">Create Account</button>
      <div class="toggle-link">
        Already have an account? <span onclick="toggleAuth()">Login Now</span>
      </div>
    </div>
    <p id="auth-msg" class="error-text"></p>
  </div>

  <div class="ocr-box hidden" id="ocr-section">
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
    <h2>✨ OCR Scanner Pro</h2>
    
    <div class="upload-section">
      <label style="display:block; margin-bottom:10px; font-weight:bold;">Upload Image or PDF</label>
      <input type="file" id="fileInput" accept="image/*,.pdf" />
    </div>

    <div class="controls">
      <div>
        <label style="font-size: 12px; font-weight: bold;">Select Language</label>
        <select id="language">
          <option value="eng">English</option>
          <option value="hin">Hindi</option>
          <option value="eng+hin">English + Hindi</option>
        </select>
      </div>
      <div style="display: flex; align-items: flex-end;">
        <button class="btn-primary" style="margin-top:0;" onclick="runOCR()">Extract Text 🚀</button>
      </div>
    </div>

    <div id="progress">Status: Ready</div>
    <textarea id="result" placeholder="Extracted text will appear here..."></textarea>
    
    <div class="download-group">
      <button class="btn-download" onclick="downloadTXT()">📄 Text File</button>
      <button class="btn-download" onclick="downloadDOCX()">📁 Word Doc</button>
    </div>
  </div>

  <script>
    // --- Yahan apna Backend URL set karein ---
    const BASE_URL = "http://localhost:5000";

    function toggleAuth() {
      document.getElementById('login-form').classList.toggle('hidden');
      document.getElementById('register-form').classList.toggle('hidden');
      document.getElementById('auth-msg').innerText = "";
    }

    async function handleRegister() {
      const user = document.getElementById('reg-user').value;
      const email = document.getElementById('reg-email').value;
      const pass = document.getElementById('reg-pass').value;

      if(!user || !email || !pass) {
        alert("Sare fields bhariye!");
        return;
      }

      try {
        const response = await fetch(`${BASE_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, email: email, password: pass })
        });

        const data = await response.json();
        if(response.ok) {
          alert("Registration Successful in SQL! ✅");
          toggleAuth();
        } else {
          alert("Error: " + data.error);
        }
      } catch (error) {
        alert("Backend Server connect nahi ho raha! Pehle node server.js chalayein.");
      }
    }

    async function handleLogin() {
      const username = document.getElementById('login-user').value;
      const password = document.getElementById('login-pass').value;

      try {
        const response = await fetch(`${BASE_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (response.ok) {
          alert("Login Successful!");
          document.getElementById('auth-section').classList.add('hidden');
          document.getElementById('ocr-section').classList.remove('hidden');
        } else {
          alert(data.error || "Invalid Credentials!");
        }
      } catch (err) {
        alert("Backend Server is not running! Make sure port 5000 is open.");
      }
    }

    function handleLogout() { location.reload(); }

    // --- OCR LOGIC ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function runOCR() {
      const fileInput = document.getElementById("fileInput");
      const lang = document.getElementById("language").value;
      const result = document.getElementById("result");
      const progress = document.getElementById("progress");

      if (fileInput.files.length === 0) {
        alert("Please upload a file first!");
        return;
      }
      
      const file = fileInput.files[0];
      result.value = "";
      progress.innerText = "Processing started...";

      try {
        if (!file.name.toLowerCase().endsWith(".pdf")) {
          const { data } = await Tesseract.recognize(file, lang, {
            logger: m => { if(m.status === "recognizing text") progress.innerText = `Scanning: ${Math.round(m.progress * 100)}%`; }
          });
          result.value = data.text;
          progress.innerText = "✅ Image Scan Complete!";
        } else {
          const pdfData = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
          let fullText = "";
          for (let i = 1; i <= pdf.numPages; i++) {
            progress.innerText = `Scanning PDF Page ${i} of ${pdf.numPages}...`;
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: context, viewport }).promise;
            const { data } = await Tesseract.recognize(canvas, lang);
            fullText += `--- Page ${i} ---\n${data.text}\n\n`;
          }
          result.value = fullText;
          progress.innerText = "✅ PDF Scan Complete!";
        }
      } catch (err) { progress.innerText = "❌ Error: " + err.message; }
    }

    function downloadTXT() {
      const text = document.getElementById("result").value;
      if(!text) return alert("No text to download");
      const blob = new Blob([text], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "ocr_output.txt";
      link.click();
    }

    function downloadDOCX() {
      const text = document.getElementById("result").value;
      if(!text) return alert("No text to download");
      const { Document, Packer, Paragraph, TextRun } = window.docx;
      const doc = new Document({
        sections: [{ children: text.split('\n').map(line => new Paragraph({ children: [new TextRun(line)] })) }]
      });
      Packer.toBlob(doc).then(blob => {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "ocr_output.docx";
        link.click();
      });
    }
  </script>
</body>
</html>
